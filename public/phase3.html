<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deal Lab · Phase 3</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
    #header { border-bottom: 1px solid #f3f4f6; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    #header-left { display: flex; align-items: center; gap: 10px; }
    .header-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #9ca3af; }
    .header-divider { color: #e5e7eb; }
    .header-sub { font-size: 13px; color: #6b7280; }
    .back-link { font-size: 12px; color: #9ca3af; text-decoration: none; }
    .back-link:hover { color: #6b7280; }
    #messages { flex: 1; overflow-y: auto; padding: 28px 24px; max-width: 720px; width: 100%; margin: 0 auto; }
    .message { margin-bottom: 24px; display: flex; flex-direction: column; }
    .message.user { align-items: flex-end; }
    .message.assistant { align-items: flex-start; }
    .message-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #9ca3af; margin-bottom: 5px; }
    .message-bubble { max-width: 88%; padding: 14px 18px; border-radius: 8px; font-size: 15px; line-height: 1.7; color: #374151; }
    .message.user .message-bubble { background: #f3f4f6; color: #111827; }
    .message.assistant .message-bubble { background: #ffffff; border: 1px solid #e5e7eb; }
    .message-bubble p { margin: 0 0 10px 0; }
    .message-bubble p:last-child { margin-bottom: 0; }
    .message-bubble ul { margin: 6px 0; padding-left: 18px; }
    .message-bubble li { margin-bottom: 4px; }
    #typing { display: none; margin-bottom: 24px; flex-direction: column; align-items: flex-start; }
    #typing .message-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #9ca3af; margin-bottom: 5px; }
    #typing-bubble { padding: 14px 18px; border-radius: 8px; border: 1px solid #e5e7eb; display: flex; gap: 5px; align-items: center; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #9ca3af; animation: pulse 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.85); } 50% { opacity: 1; transform: scale(1); } }
    #error { color: #dc2626; font-size: 13px; text-align: center; margin-bottom: 16px; display: none; }
    #input-area { border-top: 1px solid #f3f4f6; padding: 14px 24px; max-width: 720px; width: 100%; margin: 0 auto; }
    #input-row { display: flex; gap: 8px; align-items: flex-end; }
    #input { flex: 1; padding: 11px 14px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; color: #111827; font-size: 15px; font-family: inherit; outline: none; resize: none; line-height: 1.5; min-height: 42px; max-height: 140px; overflow-y: auto; }
    #send { padding: 11px 18px; background: #111827; border: none; border-radius: 6px; color: #ffffff; font-size: 13px; font-weight: 500; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
    #send:disabled { background: #f3f4f6; color: #9ca3af; cursor: default; }
    #hint { font-size: 11px; color: #d1d5db; margin-top: 7px; }
  </style>
</head>
<body>
  <div id="header">
    <div id="header-left">
      <span class="header-label">Deal Lab · Phase 3</span>
      <span class="header-divider">|</span>
      <span class="header-sub">Negotiation</span>
    </div>
    <a class="back-link" href="/">← All Phases</a>
  </div>

  <div id="messages">
    <div class="message assistant">
      <div class="message-label">Bethany</div>
      <div class="message-bubble"><p>Good to meet you. I've been looking forward to getting this done — I think John and Derek are building something real. You have a counter for me?</p></div>
    </div>
    <div id="typing">
      <div class="message-label">Bethany</div>
      <div id="typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
    <div id="error"></div>
  </div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="input" rows="1" placeholder="Present your counter-proposal or respond to Bethany..."></textarea>
      <button id="send" disabled>Send</button>
    </div>
    <p id="hint">Enter to send · Shift+Enter for new line</p>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const typingEl = document.getElementById("typing");
    const errorEl = document.getElementById("error");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const history = [];
    let loading = false;

    function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

    function formatText(text) {
      const lines = text.split("\n");
      let html = "";
      let i = 0;
      while (i < lines.length) {
        const line = lines[i];
        if (line.trim() === "") { i++; continue; }
        if (/^[-•]\s/.test(line.trim())) {
          html += "<ul>";
          while (i < lines.length && /^[-•]\s/.test(lines[i].trim())) {
            html += `<li>${lines[i].trim().replace(/^[-•]\s/, "")}</li>`;
            i++;
          }
          html += "</ul>";
          continue;
        }
        html += `<p>${line}</p>`;
        i++;
      }
      return html;
    }

    function addMessage(role, text) {
      const label = role === "user" ? "Attorney" : "Bethany";
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.innerHTML = `<div class="message-label">${label}</div><div class="message-bubble">${role === "assistant" ? formatText(text) : `<p>${text}</p>`}</div>`;
      messagesEl.insertBefore(div, typingEl);
      scrollToBottom();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || loading) return;
      loading = true;
      sendBtn.disabled = true;
      errorEl.style.display = "none";
      inputEl.value = "";
      inputEl.style.height = "auto";
      addMessage("user", text);
      history.push({ role: "user", content: text });
      typingEl.style.display = "flex";
      scrollToBottom();
      try {
        const response = await fetch("/api/chat/3", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history }),
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        const reply = data.content.map(b => b.text || "").join("");
        history.push({ role: "assistant", content: reply });
        typingEl.style.display = "none";
        addMessage("assistant", reply);
      } catch (err) {
        typingEl.style.display = "none";
        history.pop();
        inputEl.value = text;
        errorEl.textContent = "Something went wrong. Please try again.";
        errorEl.style.display = "block";
      } finally {
        loading = false;
        sendBtn.disabled = !inputEl.value.trim();
        scrollToBottom();
      }
    }

    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
      sendBtn.disabled = !inputEl.value.trim() || loading;
    });
    inputEl.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    sendBtn.addEventListener("click", sendMessage);
  </script>
</body>
</html>
